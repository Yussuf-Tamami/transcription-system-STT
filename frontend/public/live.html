<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>H-TECH - Live Transcription</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html">HOME</a>
        <a href="history.html">HISTORY</a>
    </nav>

    <div class="container" style="text-align: center;">
        <h2>🎤 Live Streaming</h2>
        <p id="liveStatus" style="color: #666;">Status: Ready to listen</p>
        
        <div id="liveDisplay" style="width: 100%; height: 250px; border: 1px solid #ddd; margin-top: 20px; padding: 15px; overflow-y: auto; text-align: left; background: #fafafa; border-radius: 8px; font-size: 1.1rem;">
            Waiting for audio...
        </div>

        <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
            <button id="startBtn" onclick="startLive()" class="btn btn-success" style="width: auto;">Start Recording</button>
            <button id="stopBtn" onclick="stopLive()" class="btn btn-danger" style="width: auto;" disabled>Stop Recording</button>
        </div>
    </div>

    <script src="js/stt/stt_live.js"></script>
</body>
</html>
