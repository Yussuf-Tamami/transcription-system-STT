<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transcriptions History</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html">HOME</a>
        <a href="history.html">HISTORY</a>
    </nav>

   <div class="container">
        <h2 style="text-align: center; margin-bottom: 20px;">Processing History</h2>
        
        <div style="text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 10px;">
            <button onclick="loadHistory('stt')" id="sttBtn" class="btn btn-primary">🎤 STT & Diarization</button>
            <button onclick="loadHistory('tts')" id="ttsBtn" class="btn btn-outline-primary">🔊 Text-to-Speech</button>
        </div>

        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr id="tableHeaders" style="border-bottom: 2px solid #ddd; background: #fafafa;">
                    <th style="padding: 10px;">ID</th>
                    <th style="padding: 10px;">Source</th>
                    <th style="padding: 10px;">Preview</th>
                    <th style="padding: 10px;">Date</th>
                    <th style="padding: 10px; text-align: center;">Audio</th>
                </tr>
            </thead>
            <tbody id="historyTable"></tbody>
        </table>
    </div>

    <script src="js/history.js"></script>
</body>
</html>
