<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Whisper Upload</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 90%; margin-top: 100px; background: white; padding: 40px; border-radius: 20px; shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .status-pill { padding: 6px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 20px; display: inline-block; }
        .status-processing { background: #fff3cd; color: #856404; animation: pulse 1.5s infinite; }
        .status-done { background: #d4edda; color: #155724; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .loader-line { height: 4px; width: 100%; background: #eee; overflow: hidden; border-radius: 2px; display: none; margin-top: 20px; }
        .loader-line::after { content: ''; display: block; height: 100%; width: 50%; background: var(--primary); animation: loading 1.5s infinite linear; }
        @keyframes loading { from { margin-left: -50%; } to { margin-left: 100%; } }
    </style>
</head>
<body>
    <nav style="background: #333; width: 100%; padding: 15px; text-align: center; position: fixed; top: 0;">
        <a href="/" style="color: white; text-decoration: none; font-weight: bold; margin: 0 20px;">HOME</a>
        <a href="/history" style="color: white; text-decoration: none; font-weight: bold;">HISTORY</a>
    </nav>

    <div class="container">
        <div id="statusTag" class="status-pill" style="display: none;"></div>
        <h2 style="margin-top: 0;">📁 Whisper Transcription</h2>
        <p style="color: #666;">Upload audio/video for high-accuracy processing.</p>

        <div style="border: 2px dashed #ccc; padding: 30px; border-radius: 15px; text-align: center;">
            <input type="file" id="fileInput" accept="audio/*,video/*" style="width: 100%; margin-bottom: 20px;">
            <button id="mainBtn" onclick="handleWorkflow()" style="width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
                Run AI Transcription
            </button>
            <div id="progressLine" class="loader-line"></div>
        </div>

        <div id="resultBox" class="output-area">
            Waiting for a file to process...
        </div>
    </div>

    <script>
        let pollTimer = null;

        async function handleWorkflow() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files[0]) return alert("Please select a file!");

            // 1. UI Reset
            toggleUIState(true);
            
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                // 2. Initial Upload
                const response = await fetch('/api/upload', { method: 'POST', body: formData });
                const initData = await response.json();
                
                if (initData.id) {
                    // 3. Start Smart Polling
                    checkStatus(initData.id);
                }
            } catch (err) {
                updateUI("Error connecting to server", "error");
                toggleUIState(false);
            }
        }

        async function checkStatus(id) {
            try {
                const resp = await fetch(`/api/status/${id}`);
                const data = await resp.json();

                if (data.status === "done") {
                    updateUI(data.text, "done");
                    toggleUIState(false);
                } else if (data.status === "error") {
                    updateUI("Transcription failed.", "error");
                    toggleUIState(false);
                } else {
                    // Not ready yet? Check again in 3 seconds (Not overwhelming)
                    pollTimer = setTimeout(() => checkStatus(id), 3000);
                }
            } catch (e) {
                console.error("Polling error", e);
            }
        }

        function toggleUIState(isProcessing) {
            const btn = document.getElementById('mainBtn');
            const loader = document.getElementById('progressLine');
            const tag = document.getElementById('statusTag');
            
            if (isProcessing) {
                btn.disabled = true;
                btn.style.opacity = "0.5";
                loader.style.display = "block";
                tag.style.display = "inline-block";
                tag.innerText = "Processing...";
                tag.className = "status-pill status-processing";
                document.getElementById('resultBox').innerText = "AI is analyzing the audio, please wait...";
            } else {
                btn.disabled = false;
                btn.style.opacity = "1";
                loader.style.display = "none";
            }
        }

        function updateUI(text, state) {
            const box = document.getElementById('resultBox');
            const tag = document.getElementById('statusTag');
            
            box.innerText = text;
            if (state === "done") {
                tag.innerText = "Complete";
                tag.className = "status-pill status-done";
            }
        }
    </script>
</body>
</html>
