<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>H-TECH Transcription - Hub</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; align-items: center; }
        nav { background: #333; width: 100%; padding: 15px; text-align: center; position: fixed; top: 0; z-index: 1000; }
        nav a { color: white; margin: 0 20px; text-decoration: none; font-weight: bold; }
        .hero { text-align: center; margin-top: 120px; }
        .card-container { display: flex; gap: 30px; margin-top: 50px; }
        .choice-card {
            background: white; padding: 40px; border-radius: 15px; width: 280px;
            text-align: center; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid transparent;
        }
        .choice-card:hover { transform: translateY(-10px); border-color: #007bff; background: #f0f7ff; }
        .icon { font-size: 60px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav>
        <a href="/">HOME</a>
        <a href="/history">HISTORY</a>
    </nav>

    <div class="hero">
        <h1>Transcription Services</h1>
        <p>Select your preferred input method</p>
    </div>

    <div class="card-container">
        <div class="choice-card" onclick="location.href='/upload-service'">
            <div class="icon">📁</div>
            <h3>File Upload</h3>
            <p>Upload audio/video for high-accuracy transcription using <strong>Whisper AI</strong>.</p>
        </div>

        <div class="choice-card" onclick="location.href='/live-service'">
            <div class="icon">🎤</div>
            <h3>Live Streaming</h3>
            <p>Speak in real-time and get instant results using <strong>Vosk Engine</strong>.</p>
        </div>
    </div>
</body>
</html>
