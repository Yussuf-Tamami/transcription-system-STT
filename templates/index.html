<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcription System</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        .upload-box { border: 2px dashed #ccc; padding: 30px; text-align: center; border-radius: 10px; }
        #status { margin-top: 20px; padding: 10px; display: none; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Audio Transcription</h1>
    <div class="upload-box">
        <input type="file" id="audioFile" accept="audio/*">
        <button onclick="uploadFile()">Upload & Transcribe</button>
    </div>

    <div id="status"></div>

    <hr>
<h2>Transcription History</h2>
<button onclick="loadHistory()">Refresh History</button>
<table border="1" style="width:100%; margin-top:10px; border-collapse: collapse;">
    <thead>
        <tr style="background: #eee;">
            <th>Filename</th>
            <th>Status</th>
            <th>Result</th>
        </tr>
    </thead>
    <tbody id="historyBody"></tbody>
</table>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('audioFile');
            const statusDiv = document.getElementById('status');
            
            if (fileInput.files.length === 0) {
                alert("Please select a file first.");
                return;
            }

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            statusDiv.style.display = 'block';
            statusDiv.className = '';
            statusDiv.innerText = "Uploading...";

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (response.ok) {
                    statusDiv.className = 'success';
                    statusDiv.innerText = `Success! File ID: ${result.id}. Status: ${result.status}`;
                } else {
                    throw new Error(result.detail || "Upload failed");
                }
            } catch (err) {
                statusDiv.className = 'error';
                statusDiv.innerText = err.message;
            }
        }

        async function loadHistory() {
    const tbody = document.getElementById('historyBody');
    try {
        const response = await fetch('/api/history');
        const data = await response.json();
        
        tbody.innerHTML = data.map(item => `
            <tr>
                <td>${item.filename}</td>
                <td><strong>${item.status}</strong></td>
                <td>${item.transcription_text || '<em>Processing...</em>'}</td>
            </tr>
        `).join('');
    } catch (err) {
        console.error("Failed to load history", err);
    }
}

// Load history automatically on page load
window.onload = loadHistory;
    </script>



<div class="upload-box" style="margin-top: 20px; border-color: #007bff; text-align: left;">
    <h2>Live Transcription</h2>
    <div style="margin-bottom: 10px;">
        <button id="startBtn" onclick="startLive()">Start Microphone</button>
        <button id="stopBtn" onclick="stopLive()" disabled>Stop & Save</button>
    </div>
    
    <div id="liveDisplay" style="min-height: 50px; border: 1px solid #ddd; padding: 10px; background: #f9f9f9; border-radius: 5px;">
        <em>Waiting for microphone...</em>
    </div>
    <p id="liveStatus" style="font-size: 0.8em; color: #666;"></p>
</div>

<script>
    let socket;
    let mediaRecorder;

   
    async function startLive() {
    const liveDisplay = document.getElementById('liveDisplay');
    const liveStatus = document.getElementById('liveStatus');
    
    try {
        // 1. Request Mic Access
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        console.log("Mic access granted!");

        // 2. Setup WebSocket
        socket = new WebSocket(`ws://${window.location.host}/ws/live`);
        
        socket.onopen = () => {
            liveDisplay.innerText = "Listening...";
            liveStatus.innerText = "🔴 Recording...";
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            
            // 3. Start Recorder
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0 && socket.readyState === WebSocket.OPEN) {
                    socket.send(event.data);
                }
            };
            mediaRecorder.start(1000); // Send chunk every second
        };

        socket.onerror = (error) => {
            console.error("WebSocket Error:", error);
            alert("Connection to server failed!");
        };

        let finalDisplay = ""; // Persistent storage for finished sentences

socket.onmessage = (event) => {
    const data = JSON.parse(event.data);
    const liveDisplay = document.getElementById('liveDisplay');

    if (data.status === "partial") {
        // Show the persistent text + the current "live" guess in grey
        liveDisplay.innerHTML = `${finalDisplay} <span style="color: #888;">${data.text}</span>`;
    } 
    else if (data.status === "final_chunk") {
        // A sentence is finished, add it to the persistent display
        finalDisplay += data.text + ". ";
        liveDisplay.innerHTML = `<strong>${finalDisplay}</strong>`;
    } 
    else if (data.status === "complete") {
        liveDisplay.innerHTML = `<strong>Final Transcript:</strong> ${data.text}`;
        loadHistory(); // Refresh the MySQL table
    }
};

    } catch (err) {
        console.error("Mic Access Error:", err);
        alert("Could not access microphone. Make sure you are on localhost or HTTPS.");
    }
}


    function stopLive() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
    }
    
    // Give the recorder a tiny bit of time to send the final chunk 
    // before sending the end signal.
    setTimeout(() => {
        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send("END_OF_STREAM"); 
        }
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
    }, 500);
}
</script>
</body>
</html>
